name: 量化大脑自动巡检 (v9.0)

on:
  schedule:
    # 设定在 UTC 时间 23:00 运行（精准对应北京/东八区早上 07:00，确保获取前一交易日完整收盘数据）
    - cron: '0 23 * * 1-5'
  
  # 保持手动触发开关开启
  workflow_dispatch: 

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v4

    - name: 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 安装量化系统依赖包
      run: |
        python -m pip install --upgrade pip
        # 锁定主干版本，防范未来第三方库发生破坏性更新
        pip install requests==2.31.0 pandas==2.1.4 numpy==1.26.4 openpyxl==3.1.2

    - name: 启动全维量化大脑进行矩阵推演
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: |
        python 基金智能打分.py

    - name: 备份策略生成的 Excel 报表留存至云端
      uses: actions/upload-artifact@v4
      with:
        name: Quant-Matrix-Report-${{ github.run_id }}
        path: "*.xlsx"
        retention-days: 7
