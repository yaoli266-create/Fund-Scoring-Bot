name: 基金智能打分大脑

on:
  schedule:
    # 每天北京时间 17:15 执行 (UTC 09:15)
    - cron: '15 9 * * 1-5'
  workflow_dispatch: 

jobs:
  run-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 🔴 提速外挂：开启 pip 缓存，以后运行再也不用傻等依赖下载了！
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 🔴 直连装甲：在这里把 pytdx 装上，支撑底层的 Socket 通信！
        pip install akshare pandas numpy openpyxl requests pytdx

    - name: 运行量化大脑 (ETF与个股双引擎)
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        SMTP_SERVER: smtp.qq.com
        SMTP_PORT: 465
      run: |
        python 基金智能打分.py
        python 股票动能智能打分.py

    - name: 提取云端运算结果包
      uses: actions/upload-artifact@v4
      with:
        name: 今日量化综合复盘包
        # 用星号通吃，一键打包基金和股票生成的所有 Excel 表格
        path: "*.xlsx"
        retention-days: 7
