name: 股票动能巡检 (A股盘后)

on:
  schedule:
    # 设定在 UTC 时间 08:00 运行 (对应北京时间 16:00，A股刚收盘且数据已落库)
    - cron: '0 8 * * 1-5'
  
  workflow_dispatch: 

jobs:
  run-stock-strategy:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v4

    - name: 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 安装量化系统依赖包
      run: |
        python -m pip install --upgrade pip
        # 直接复用仓库里的依赖清单
        pip install -r requirements.txt

    - name: 启动股票动能推演
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: |
        # 运行你截图里的股票脚本
        python 股票动能智能打分.py
