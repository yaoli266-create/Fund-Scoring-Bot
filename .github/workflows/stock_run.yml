name: 股票动能打分大脑

on:
  schedule:
    # 每天北京时间 17:15 执行 (UTC 09:15)
    - cron: '15 9 * * 1-5'
  workflow_dispatch: 

jobs:
  run-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # ⚡ 保持 pip 缓存提速引擎开启
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # ⚡ 确保底层 Socket 通信的 pytdx 已安装
        pip install akshare pandas numpy openpyxl requests pytdx

    - name: 运行量化大脑 (纯粹个股引擎)
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        SMTP_SERVER: smtp.qq.com
        SMTP_PORT: 465
      run: |
        # 🔴 核心剥离：现在这里只运行股票脚本，算力 100% 聚焦
        python 股票动能智能打分.py

    - name: 提取云端运算结果包
      uses: actions/upload-artifact@v4
      with:
        # 🎯 专属重命名：生成的云端下载包名称更加精准
        name: A股主升浪动能复盘包
        path: "*.xlsx"
        retention-days: 7
