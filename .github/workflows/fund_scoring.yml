name: 基金智能打分大脑

on:
  schedule:
    # 每天北京时间 16:30 执行 (UTC 08:30)
    - cron: '15 9 * * 1-5'
  workflow_dispatch: 

jobs:
  run-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install akshare pandas numpy openpyxl requests

    # (前面安装依赖的代码保持不变)
    
    - name: 运行量化大脑 (ETF与个股双引擎)
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        SMTP_SERVER: smtp.qq.com
        SMTP_PORT: 465
      run: |
        python 基金智能打分.py
        python 股票动能智能打分.py

    - name: 提取云端运算结果包
      uses: actions/upload-artifact@v4
      with:
        name: 今日量化综合复盘包
        # 用星号匹配所有生成的 xlsx 文件
        path: "*.xlsx"
        retention-days: 7

    - name: Upload Excel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 智能打分结果表单
        path: 全量基金智能打分表.xlsx
        retention-days: 7
